name: CI Pipeline

# Trigger on push or pull request to the main branches
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    # Run on a virtual machine with the latest version of Ubuntu
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code into the virtual machine
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up Node.js (using v18 as recommended in README)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # Step 3: Navigate to backend, install dependencies, and run Jest unit tests
    - name: Install dependencies and run tests
      run: |
        cd backend
        npm install
        npx jest
